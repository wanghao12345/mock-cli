        passwordExpiry:
          type: string
        lastLogin:
          type: string
      required:
        - id
        - createdAt
        - updatedAt
        - schemaVersion
        - authType
        - facility
        - displayName
        - username
        - role
        - hasViewedMontageGuide
        - trackingOptOut
        - requiresPasswordReset
        - disabled
        - passwordExpiry
        - lastLogin
      type: object
      additionalProperties: false
    FixtureFacility:
      properties:
        id:
          type: string
        facilityCode:
          type: string
        facilityType:
          type: string
        schemaVersion:
          type: string
        cloudGapServer:
          type: boolean
        workflowTypes:
          items:
            type: string
          type: array
        workflowAvailability:
          items:
            $ref: "#/components/schemas/ProductSurfaceWorkflowAvailabilityOption"
          type: array
        aboutConfig:
          type: string
        options:
          properties:
            trackingEnabled:
              type: boolean
            minSpecEnforcement:
              properties:
                networkSpeed:
                  type: string
                OS:
                  type: string
                browserOutOfDate:
                  type: string
                browserType:
                  type: string
                memory:
                  type: string
                screenResolution:
                  type: string
              required:
                - networkSpeed
                - OS
                - browserOutOfDate
                - browserType
                - memory
                - screenResolution
              type: object
            password:
              properties:
                upperCaseCount:
                  type: number
                  format: double
                specialCharacters:
                  type: string
                specialCharacterCount:
                  type: number
                  format: double
                numericCount:
                  type: number
                  format: double
                minimumLength:
                  type: number
                  format: double
                lowerCaseCount:
                  type: number
                  format: double
                expiration:
                  type: number
                  format: double
              required:
                - upperCaseCount
                - specialCharacters
                - specialCharacterCount
                - numericCount
                - minimumLength
                - lowerCaseCount
                - expiration
              type: object
            session:
              properties:
                duration:
                  type: number
                  format: double
              required:
                - duration
              type: object
          required:
            - trackingEnabled
            - minSpecEnforcement
            - password
            - session
          type: object
      required:
        - id
        - facilityCode
        - facilityType
        - schemaVersion
        - cloudGapServer
        - workflowTypes
        - workflowAvailability
        - aboutConfig
        - options
      type: object
      additionalProperties: false
    FixtureSession:
      properties:
        user:
          $ref: "#/components/schemas/FixtureUser"
        facility:
          $ref: "#/components/schemas/FixtureFacility"
      required:
        - user
        - facility
      type: object
      additionalProperties: false
    LoginRequest:
      properties:
        facilityCode:
          type: string
        username:
          type: string
        password:
          type: string
        pin:
          type: string
      required:
        - facilityCode
        - username
      type: object
      additionalProperties: false
    LogoutResponse:
      properties:
        ok:
          type: boolean
          enum:
            - true
          nullable: false
      required:
        - ok
      type: object
      additionalProperties: false
  securitySchemes: {}
